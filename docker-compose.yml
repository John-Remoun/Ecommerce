services:
  app:
    build: .
    ports:
      - '8000:8000'
    env_file:
      - .env.example
    environment:
      DB_URI: mongodb://mongo:27017/ecommmerce
      REDIS_URI: redis://redis:6379
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  mongo_data:
